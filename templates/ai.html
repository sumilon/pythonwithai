<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>SumilonGPT</title>
    <meta name="description" content="SumilonGPT — AI chat powered by Groq and Llama 3.1"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:       #212121;
          --surface:  #2f2f2f;
          --border:   #3f3f3f;
          --text:     #ececec;
          --sub:      #8e8ea0;
          --muted:    #555;
          --accent:   #19c37d;
          --r:        14px;
          --font:     'Sora', system-ui, sans-serif;
        }

        html, body { height: 100%; overflow: hidden; }
        body {
          font-family: var(--font);
          background: var(--bg);
          color: var(--text);
          font-size: 15px;
          line-height: 1.7;
        }

        .shell { height: 100dvh; display: flex; flex-direction: column; }

        /* ── Header ── */
        header {
          flex-shrink: 0;
          display: flex; align-items: center; justify-content: space-between;
          padding: 13px 20px;
          border-bottom: 1px solid var(--border);
          background: var(--bg);
        }
        .brand { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.2px; }
        .model-tag {
          font-size: 11px; color: var(--muted);
          background: var(--surface); border: 1px solid var(--border);
          padding: 3px 10px; border-radius: 20px; letter-spacing: .02em;
        }

        /* ── Chat scroll area ── */
        .chat {
          flex: 1; overflow-y: auto; scroll-behavior: smooth;
          padding: 32px 16px 16px;
        }
        .chat-inner { max-width: 700px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }

        .chat::-webkit-scrollbar { width: 4px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Welcome screen ── */
        .welcome { padding: 48px 0 28px; animation: fadeUp .4s ease both; }
        .welcome h2 { font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: -.5px; line-height: 1.2; margin-bottom: 10px; }
        .welcome p  { font-size: 14px; color: var(--sub); line-height: 1.8; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; }
        .chip {
          font-family: var(--font); font-size: 13px; color: var(--sub);
          background: var(--surface); border: 1px solid var(--border);
          padding: 7px 15px; border-radius: 99px; cursor: pointer;
          transition: color .15s, border-color .15s, background .15s;
        }
        .chip:hover { color: var(--text); border-color: #666; background: #383838; }

        /* ── Chat turns ── */
        .turn { animation: fadeUp .3s ease both; }

        .turn.user { display: flex; justify-content: flex-end; margin-bottom: 6px; }
        .turn.user .bubble {
          background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--r); border-bottom-right-radius: 4px;
          padding: 11px 16px; max-width: 76%;
          font-size: 15px; line-height: 1.75; color: var(--text);
          word-break: break-word; white-space: pre-wrap;
        }

        .turn.ai { margin-bottom: 20px; }
        .turn.ai .bubble {
          font-size: 15px; line-height: 1.85; color: var(--text);
          white-space: pre-wrap; word-break: break-word;
          min-height: 1.85em;
        }
        .turn.ai .bubble.err {
          background: #3b1c1c; border: 1px solid #7f1d1d; color: #fca5a5;
          border-radius: 10px; padding: 10px 14px;
          font-size: 14px; white-space: normal;
        }

        /* ── Typewriter blinking cursor ── */
        .cursor {
          display: inline-block;
          width: 2px; height: 1.1em;
          background: var(--accent);
          border-radius: 1px;
          margin-left: 2px;
          vertical-align: text-bottom;
          animation: blink .7s step-end infinite;
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50%       { opacity: 0; }
        }

        /* ── Thinking dots ── */
        .thinking {
          display: flex; align-items: center; gap: 5px;
          padding: 4px 0;
        }
        .thinking span {
          width: 7px; height: 7px; border-radius: 50%;
          background: var(--sub);
          animation: bounce 1.1s ease-in-out infinite;
        }
        .thinking span:nth-child(2) { animation-delay: .18s; }
        .thinking span:nth-child(3) { animation-delay: .36s; }
        @keyframes bounce {
          0%, 80%, 100% { transform: translateY(0);    opacity: .4; }
          40%            { transform: translateY(-6px); opacity: 1;  }
        }

        /* ── Input zone ── */
        .input-zone {
          flex-shrink: 0;
          padding: 8px 16px max(36px, env(safe-area-inset-bottom));
          background: var(--bg);
        }
        .input-wrap { max-width: 700px; margin: 0 auto; }
        .input-box {
          display: flex; align-items: flex-end; gap: 10px;
          background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--r); padding: 12px 12px 12px 18px;
          transition: border-color .15s, box-shadow .15s;
        }
        .input-box:focus-within { border-color: #5a5a5a; box-shadow: 0 0 0 3px rgba(255,255,255,.03); }

        textarea {
          flex: 1; background: transparent; border: none; outline: none;
          font-family: var(--font); font-size: 15px; color: var(--text);
          resize: none; line-height: 1.6; min-height: 24px; max-height: 180px; overflow-y: auto;
        }
        textarea::placeholder { color: var(--muted); }
        textarea::-webkit-scrollbar { width: 0; }

        .send {
          width: 34px; height: 34px; border-radius: 8px; border: none;
          background: var(--accent); display: grid; place-items: center;
          cursor: pointer; flex-shrink: 0; transition: background .13s, opacity .13s;
        }
        .send:hover  { background: #15a368; }
        .send:disabled { background: #3a3a3a; cursor: not-allowed; }
        .send svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

        .input-foot { display: flex; justify-content: space-between; margin-top: 7px; padding: 0 2px; }
        .hint { font-size: 11px; color: var(--muted); }
        .ct   { font-size: 11px; color: var(--muted); }
        .ct.warn { color: #f87171; }

        /* ── Animations ── */
        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(8px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
          header { padding: 11px 16px; }
          .chat  { padding: 20px 12px 10px; }
          .input-zone { padding: 6px 12px max(36px, env(safe-area-inset-bottom)); }
          .welcome { padding: 32px 0 20px; }
          .welcome h2 { font-size: 23px; }
          .welcome p  { font-size: 13px; }
          .chip { font-size: 12px; padding: 6px 12px; }
          .turn.user .bubble { max-width: 88%; font-size: 14px; }
          .turn.ai .bubble   { font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="shell">

    <header>
        <span class="brand">SumilonGPT</span>
        <span class="model-tag">Llama 3.1 · Groq</span>
    </header>

    <div class="chat" id="chat">
        <div class="chat-inner" id="chat-inner">

            <!-- Welcome screen — hidden once first message is sent -->
            <div class="welcome" id="welcome">
                <h2>How can I help<br>you today?</h2>
                <p>Ask me anything — summarise, explain,<br>translate, write, or brainstorm ideas.</p>
                <div class="chips">
                    <span class="chip" onclick="fill('Summarise this text for me:')">Summarise text</span>
                    <span class="chip" onclick="fill('Explain this in simple terms:')">Explain a concept</span>
                    <span class="chip" onclick="fill('Translate this to English:')">Translate</span>
                    <span class="chip" onclick="fill('Help me brainstorm ideas for')">Brainstorm</span>
                    <span class="chip" onclick="fill('Write a professional email about')">Write an email</span>
                </div>
            </div>

        </div>
    </div>

    <div class="input-zone">
        <div class="input-wrap">
            <div class="input-box">
                <textarea
                    id="ta" rows="1" maxlength="2000"
                    placeholder="Message SumilonGPT…"
                ></textarea>
                <button class="send" id="snd" disabled aria-label="Send">
                    <svg viewBox="0 0 16 16">
                        <line x1="8" y1="13" x2="8" y2="3"/>
                        <polyline points="4,7 8,3 12,7"/>
                    </svg>
                </button>
            </div>
            <div class="input-foot">
                <span class="hint">Enter to send &middot; Shift+Enter for new line</span>
                <span class="ct" id="ct"></span>
            </div>
        </div>
    </div>

</div>

<script>
(function () {
    'use strict';

    /* ── DOM refs ── */
    const chat      = document.getElementById('chat');
    const chatInner = document.getElementById('chat-inner');
    const welcome   = document.getElementById('welcome');
    const ta        = document.getElementById('ta');
    const snd       = document.getElementById('snd');
    const ct        = document.getElementById('ct');

    let isBusy = false;   // prevent double-submit while AI is responding

    /* ────────────────────────────────────────────────────────────
       TEXTAREA helpers
    ──────────────────────────────────────────────────────────── */
    function onInput() {
        ta.style.height = 'auto';
        ta.style.height = Math.min(ta.scrollHeight, 180) + 'px';
        const n = ta.value.length;
        snd.disabled = isBusy || !ta.value.trim();
        ct.textContent = n > 1600 ? n + '/2000' : '';
        ct.className   = 'ct' + (n > 1800 ? ' warn' : '');
    }

    function onKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!snd.disabled) sendMessage();
        }
    }

    function fill(t) {
        ta.value = t;
        onInput();
        ta.focus();
        ta.setSelectionRange(t.length, t.length);
    }

    ta.addEventListener('input',   onInput);
    ta.addEventListener('keydown', onKeyDown);
    snd.addEventListener('click',  sendMessage);
    window.fill = fill;   // expose for chip onclick attributes

    /* ────────────────────────────────────────────────────────────
       SCROLL
    ──────────────────────────────────────────────────────────── */
    function scrollBottom() {
        chat.scrollTop = chat.scrollHeight;
    }

    /* ────────────────────────────────────────────────────────────
       DOM builders
    ──────────────────────────────────────────────────────────── */
    function appendUserBubble(text) {
        const turn = document.createElement('div');
        turn.className = 'turn user';
        turn.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
        chatInner.appendChild(turn);
        scrollBottom();
    }

    function appendThinking() {
        const turn = document.createElement('div');
        turn.className = 'turn ai';
        turn.innerHTML = `
            <div class="bubble" id="ai-bubble">
                <div class="thinking">
                    <span></span><span></span><span></span>
                </div>
            </div>`;
        chatInner.appendChild(turn);
        scrollBottom();
        return turn;
    }

    function appendErrorBubble(msg) {
        const turn = document.createElement('div');
        turn.className = 'turn ai';
        turn.innerHTML = `<div class="bubble err">⚠ ${escHtml(msg)}</div>`;
        chatInner.appendChild(turn);
        scrollBottom();
    }

    /* ────────────────────────────────────────────────────────────
       TYPEWRITER
       Renders the full answer character-by-character with a blinking
       cursor, then removes the cursor when done.
    ──────────────────────────────────────────────────────────── */
    function typewrite(bubble, text, onDone) {
        bubble.innerHTML = '';   // clear the thinking dots

        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        bubble.appendChild(cursor);

        // Split into individual characters so we can pace naturally.
        // We also want to keep newlines intact → use Array.from for
        // proper Unicode handling.
        const chars = Array.from(text);
        let   i     = 0;

        // Speed: ~18 ms per char gives ~55 chars/s — feels natural.
        // We speed up for long responses so it never drags.
        const delay = chars.length > 800 ? 8 : chars.length > 300 ? 12 : 18;

        function tick() {
            if (i < chars.length) {
                // Insert before cursor
                const ch = chars[i++];
                cursor.insertAdjacentText('beforebegin', ch);
                scrollBottom();
                setTimeout(tick, delay);
            } else {
                // Done — remove cursor
                cursor.remove();
                if (onDone) onDone();
            }
        }

        tick();
    }

    /* ────────────────────────────────────────────────────────────
       SEND
    ──────────────────────────────────────────────────────────── */
    function sendMessage() {
        const prompt = ta.value.trim();
        if (!prompt || isBusy) return;

        /* 1. Hide welcome screen on first send */
        if (welcome) welcome.style.display = 'none';

        /* 2. Lock UI */
        isBusy       = true;
        snd.disabled = true;
        setSendSpinner(true);

        /* 3. Show user bubble */
        appendUserBubble(prompt);

        /* 4. Clear & reset textarea */
        ta.value           = '';
        ta.style.height    = 'auto';
        ct.textContent     = '';

        /* 5. Show thinking dots */
        const aiTurn = appendThinking();
        const bubble = aiTurn.querySelector('#ai-bubble');
        bubble.removeAttribute('id');   // de-duplicate in case of multiple turns

        /* 6. Fetch */
        fetch('/api/chat', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ prompt }),
        })
        .then(function (res) { return res.json(); })
        .then(function (data) {
            if (data.error) {
                bubble.innerHTML = '';
                bubble.classList.add('err');
                bubble.textContent = '⚠ ' + data.error;
                unblock();
            } else {
                typewrite(bubble, data.answer, unblock);
            }
        })
        .catch(function () {
            bubble.innerHTML = '';
            bubble.classList.add('err');
            bubble.textContent = '⚠ Network error — please try again.';
            unblock();
        });
    }

    /* ────────────────────────────────────────────────────────────
       UI state helpers
    ──────────────────────────────────────────────────────────── */
    function unblock() {
        isBusy       = false;
        snd.disabled = !ta.value.trim();
        setSendSpinner(false);
        ta.focus();
    }

    function setSendSpinner(on) {
        if (on) {
            snd.innerHTML = `<svg viewBox="0 0 24 24" width="15" height="15" fill="none"
                stroke="#fff" stroke-width="2.2" stroke-linecap="round">
                <path d="M12 3a9 9 0 019 9"
                    style="transform-origin:12px 12px;animation:_sp .7s linear infinite"/>
            </svg>`;
        } else {
            snd.innerHTML = `<svg viewBox="0 0 16 16" width="15" height="15">
                <line x1="8" y1="13" x2="8" y2="3" stroke="#fff" stroke-width="2.2"
                    stroke-linecap="round"/>
                <polyline points="4,7 8,3 12,7" stroke="#fff" stroke-width="2.2"
                    fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;
        }
    }

    /* ────────────────────────────────────────────────────────────
       SECURITY: escape HTML before inserting user text
    ──────────────────────────────────────────────────────────── */
    function escHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    /* ── Inject spinner keyframe once ── */
    const s = document.createElement('style');
    s.textContent = '@keyframes _sp{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);

    ta.focus();
}());
</script>
</body>
</html>
