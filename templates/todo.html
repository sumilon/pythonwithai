<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Stride</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#F7F7F5;--card:#FFFFFF;--border:#E8E8E4;--border-hover:#D1D1CB;
          --text:#1A1A1A;--sub:#6B6B6B;--muted:#A0A0A0;--faint:#F0F0EE;
          --accent:#1A1A1A;--accent-hover:#333;
          --red:#E53E3E;--red-bg:#FFF5F5;--red-bd:#FED7D7;
          --amber:#C05621;--amber-bg:#FFFAF0;--amber-bd:#FEEBC8;
          --blue:#2B6CB0;--blue-bg:#EBF8FF;--blue-bd:#BEE3F8;
          --green:#276749;--green-bg:#F0FFF4;--green-bd:#C6F6D5;
          --r:10px;--r-sm:7px;
        }
        html,body{height:100%;overflow:hidden}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
        button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
        button{cursor:pointer}

        /* ─── Layout ─────────────────────────────────────── */
        .app{display:flex;height:100vh}

        /* ─── Sidebar ─────────────────────────────────────── */
        .side{width:230px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .22s ease;z-index:20}

        .brand{padding:22px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
        .brand-mark{width:28px;height:28px;background:var(--text);border-radius:7px;display:grid;place-items:center;flex-shrink:0}
        .brand-mark svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
        .brand-name{font-size:15px;font-weight:700;letter-spacing:-.5px}
        .brand-tag{font-size:10px;color:var(--muted);letter-spacing:.02em}

        .nav{flex:1;padding:14px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
        .nav-section{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:10px 8px 4px}
        .nav-section:first-child{padding-top:0}
        .nv{width:100%;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r-sm);border:none;background:none;color:var(--sub);font-size:13px;font-weight:500;text-align:left;transition:all .12s}
        .nv:hover{background:var(--faint);color:var(--text)}
        .nv.active{background:var(--text);color:#fff}
        .nv-ico{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
        .nv-badge{margin-left:auto;font-size:11px;font-weight:700;min-width:18px;text-align:center;opacity:.65}
        .nv.active .nv-badge{opacity:.8}

        .side-bottom{padding:14px 18px;border-top:1px solid var(--border)}
        .prog-head{display:flex;justify-content:space-between;margin-bottom:7px}
        .prog-head span{font-size:12px;font-weight:600;color:var(--sub)}
        .prog-head b{font-size:12px;font-weight:700;color:var(--text)}
        .prog-track{height:3px;background:var(--faint);border-radius:2px;overflow:hidden}
        .prog-fill{height:100%;background:var(--text);border-radius:2px;transition:width .35s ease}
        .stats{display:flex;gap:14px;margin-top:10px}
        .stat{display:flex;flex-direction:column;gap:1px}
        .stat-n{font-size:16px;font-weight:700;letter-spacing:-.5px}
        .stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

        /* ─── Main ─────────────────────────────────────────── */
        .main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

        /* top bar */
        .bar{display:flex;align-items:center;gap:10px;padding:14px 22px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
        .ham{display:none;width:32px;height:32px;border:1px solid var(--border);border-radius:var(--r-sm);background:none;place-items:center}
        .ham svg{width:15px;height:15px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round}
        .view-name{font-size:16px;font-weight:700;letter-spacing:-.4px;flex:1}
        .srch{position:relative;flex:1;max-width:240px}
        .srch svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
        #search{width:100%;padding:7px 10px 7px 28px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--faint);font-size:13px;outline:none;transition:all .15s}
        #search:focus{border-color:var(--text);background:#fff}
        #search::placeholder{color:var(--muted)}

        .add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--text);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:background .12s;white-space:nowrap;flex-shrink:0}
        .add-btn:hover{background:var(--accent-hover)}
        .add-btn svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2.8;stroke-linecap:round}
        .add-btn .btn-lbl{display:inline}

        /* chips */
        .chips{display:flex;gap:5px;flex-wrap:wrap;align-items:center;padding:10px 22px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)}
        .ch{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:none;font-size:12px;font-weight:500;color:var(--sub);transition:all .12s;white-space:nowrap}
        .ch:hover{border-color:var(--border-hover);color:var(--text)}
        .ch.on{background:var(--text);color:#fff;border-color:var(--text)}
        .sort-sel{margin-left:auto;padding:4px 8px;border:1px solid var(--border);border-radius:20px;background:none;font-size:12px;color:var(--sub);outline:none}

        /* form */
        .form-shell{background:var(--card);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .25s ease;flex-shrink:0}
        .form-shell.open{max-height:190px}
        .form-box{padding:14px 22px}
        .fi{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--faint);outline:none;font-size:14px;transition:all .15s;margin-bottom:10px}
        .fi:focus{border-color:var(--text);background:#fff}
        .fi::placeholder{color:var(--muted)}
        .f-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
        .fs{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--faint);font-size:12px;color:var(--sub);outline:none;cursor:pointer;transition:border-color .12s}
        .fs:focus{border-color:var(--text)}
        .fd{padding:6px 10px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--faint);font-size:12px;outline:none;cursor:pointer}
        .fa{margin-left:auto;display:flex;gap:6px}
        .fb{padding:6px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:none;font-size:13px;font-weight:500;transition:all .12s}
        .fb:hover{background:var(--faint)}
        .fb.ok{background:var(--text);color:#fff;border-color:var(--text)}
        .fb.ok:hover{background:var(--accent-hover)}

        /* list */
        .list{flex:1;overflow-y:auto;padding:16px 22px 48px}
        .grp-hd{display:flex;align-items:center;gap:10px;margin:20px 0 8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
        .grp-hd:first-child{margin-top:0}
        .grp-line{flex:1;height:1px;background:var(--border)}

        /* task row */
        .tk{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;transition:box-shadow .14s,opacity .18s;animation:si .16s ease}
        @keyframes si{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
        .tk:hover{box-shadow:0 2px 10px rgba(0,0,0,.06)}
        .tk.dn{opacity:.4}

        /* check */
        .ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border-hover);background:none;flex-shrink:0;display:grid;place-items:center;margin-top:1px;transition:all .14s}
        .ck:hover{border-color:var(--green);background:var(--green-bg)}
        .tk.dn .ck{background:var(--green);border-color:var(--green)}
        .ck svg{display:none;width:9px;height:7px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
        .tk.dn .ck svg{display:block}

        /* body */
        .tb{flex:1;min-width:0}
        .tt{font-size:14px;line-height:1.4;word-break:break-word}
        .tk.dn .tt{text-decoration:line-through;color:var(--muted)}
        .tm{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
        .pl{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.01em}
        .pl.high{color:var(--red);background:var(--red-bg);border:1px solid var(--red-bd)}
        .pl.medium{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-bd)}
        .pl.low{color:var(--blue);background:var(--blue-bg);border:1px solid var(--blue-bd)}
        .pl.cat{color:var(--sub);background:var(--faint);border:1px solid var(--border)}
        .dt{font-size:11px;color:var(--muted)}
        .dt.tod{color:var(--blue);font-weight:600}
        .dt.ov{color:var(--red);font-weight:600}

        /* actions */
        .ta{display:flex;gap:2px;opacity:0;transition:opacity .12s;flex-shrink:0}
        .tk:hover .ta{opacity:1}
        .ib{width:26px;height:26px;border:none;background:none;border-radius:6px;display:grid;place-items:center;color:var(--muted);transition:all .12s}
        .ib:hover{background:var(--faint);color:var(--text)}
        .ib.del:hover{background:var(--red-bg);color:var(--red)}
        .ib svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

        /* edit */
        .ei{width:100%;border:none;border-bottom:1.5px solid var(--text);background:transparent;font-size:14px;outline:none;padding:1px 0;line-height:1.4}

        /* empty */
        .emp{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;gap:10px;color:var(--muted)}
        .emp svg{width:48px;height:48px;stroke:var(--border-hover);fill:none;stroke-width:1.2;stroke-linecap:round}
        .emp-t{font-size:14px;font-weight:600;color:var(--sub)}
        .emp-s{font-size:13px}

        /* scrollbar */
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

        /* overlay */
        .ov-lay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:15}
        .ov-lay.show{display:block}

        /* ─── Responsive ────────────────────────────────── */
        @media(max-width:720px){
          .side{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
          .side.open{transform:translateX(0)}
          .ham{display:grid}
          .bar{padding:12px 14px}
          .chips{padding:9px 14px}
          .list{padding:12px 14px 48px}
          .form-box{padding:12px 14px}
          .srch{max-width:none;flex:1}
          .add-btn .btn-lbl{display:none}
          .add-btn{padding:8px 10px}
          .view-name{font-size:15px}
        }
        @media(max-width:380px){
          .view-name{display:none}
        }
    </style>
</head>
<body>

<div class="ov-lay" id="ovl" onclick="closeSide()"></div>

<div class="app">
    <!-- ── Sidebar ── -->
    <aside class="side" id="side">
        <div class="brand">
            <div class="brand-mark">
                <svg viewBox="0 0 14 14"><polyline points="1,8 5,12 13,3"/></svg>
            </div>
            <div>
                <div class="brand-name">Stride</div>
                <div class="brand-tag">Task Manager</div>
            </div>
        </div>

        <nav class="nav">
            <div class="nav-section">Workspace</div>
            <button class="nv active" onclick="setView('all',this)">
                <svg class="nv-ico" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2.5"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9.5" x2="8.5" y2="9.5"/></svg>
                All tasks <span class="nv-badge" id="nb-all">—</span>
            </button>
            <button class="nv" onclick="setView('today',this)">
                <svg class="nv-ico" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="11" rx="2.5"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/><line x1="2" y1="7" x2="14" y2="7"/></svg>
                Today <span class="nv-badge" id="nb-today">—</span>
            </button>
            <button class="nv" onclick="setView('upcoming',this)">
                <svg class="nv-ico" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 10.5,10"/></svg>
                Upcoming <span class="nv-badge" id="nb-up">—</span>
            </button>
            <div class="nav-section">Priority</div>
            <button class="nv" onclick="setView('high',this)">
                <svg class="nv-ico" viewBox="0 0 16 16"><polyline points="8,3 8,10"/><polyline points="5,6 8,3 11,6"/><line x1="5" y1="13" x2="11" y2="13"/></svg>
                High priority <span class="nv-badge" id="nb-high">—</span>
            </button>
            <div class="nav-section">Status</div>
            <button class="nv" onclick="setView('done',this)">
                <svg class="nv-ico" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><polyline points="5.5,8 7,9.5 10.5,6"/></svg>
                Completed <span class="nv-badge" id="nb-done">—</span>
            </button>
        </nav>

        <div class="side-bottom">
            <div class="prog-head">
                <span>Overall progress</span>
                <b id="pct-b">0%</b>
            </div>
            <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
            <div class="stats">
                <div class="stat"><div class="stat-n" id="st-total">0</div><div class="stat-l">Total</div></div>
                <div class="stat"><div class="stat-n" id="st-active">0</div><div class="stat-l">Active</div></div>
                <div class="stat"><div class="stat-n" id="st-done">0</div><div class="stat-l">Done</div></div>
            </div>
        </div>
    </aside>

    <!-- ── Main ── -->
    <div class="main">
        <div class="bar">
            <button class="ham" onclick="toggleSide()" aria-label="Menu">
                <svg viewBox="0 0 16 16"><line x1="2" y1="4" x2="14" y2="4"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="2" y1="12" x2="14" y2="12"/></svg>
            </button>
            <div class="view-name" id="view-name">All tasks</div>
            <div class="srch">
                <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg>
                <input type="text" id="search" placeholder="Search tasks…" oninput="render()"/>
            </div>
            <button class="add-btn" onclick="openForm()">
                <svg viewBox="0 0 12 12"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
                <span class="btn-lbl">New task</span>
            </button>
        </div>

        <div class="chips">
            <button class="ch on" onclick="setPri('',this)">All</button>
            <button class="ch" onclick="setPri('high',this)">High</button>
            <button class="ch" onclick="setPri('medium',this)">Medium</button>
            <button class="ch" onclick="setPri('low',this)">Low</button>
            <select class="sort-sel" onchange="setSort(this.value)" aria-label="Sort by">
                <option value="created">Newest first</option>
                <option value="due">Due date</option>
                <option value="priority">Priority</option>
                <option value="alpha">A → Z</option>
            </select>
        </div>

        <!-- add/edit form -->
        <div class="form-shell" id="form-shell">
            <div class="form-box">
                <input class="fi" type="text" id="f-text" placeholder="What needs to be done?" maxlength="200" onkeydown="fKey(event)"/>
                <div class="f-row">
                    <select class="fs" id="f-pri">
                        <option value="">Priority</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <select class="fs" id="f-cat">
                        <option value="">Category</option>
                        <option value="Work">Work</option>
                        <option value="Personal">Personal</option>
                        <option value="Health">Health</option>
                        <option value="Finance">Finance</option>
                        <option value="Learning">Learning</option>
                    </select>
                    <input class="fd" type="date" id="f-due" title="Due date"/>
                    <div class="fa">
                        <button class="fb" onclick="closeForm()">Cancel</button>
                        <button class="fb ok" onclick="saveTask()">Save</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="list" id="list"></div>
    </div>
</div>

<script>
    const LS='stride_v1';
    const td=()=>new Date().toISOString().slice(0,10);
    const uid=()=>Math.random().toString(36).slice(2,9);
    const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const PORD={high:0,medium:1,low:2};

    let tasks=JSON.parse(localStorage.getItem(LS)||'[]');
    let view='all',pri='',sort='created',editId=null,formOpen=false;
    const save=()=>{try{localStorage.setItem(LS,JSON.stringify(tasks))}catch(e){}};

    /* ── Mobile sidebar ── */
    const toggleSide=()=>{document.getElementById('side').classList.toggle('open');document.getElementById('ovl').classList.toggle('show');};
    const closeSide=()=>{document.getElementById('side').classList.remove('open');document.getElementById('ovl').classList.remove('show');};

    /* ── View / filter ── */
    function setView(v,btn){
      view=v;
      document.querySelectorAll('.nv').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('view-name').textContent=btn.textContent.trim().replace(/[\d—]+$/,'').trim();
      closeSide();render();
    }
    function setPri(v,btn){
      pri=v;
      document.querySelectorAll('.ch').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');render();
    }
    const setSort=v=>{sort=v;render();};

    /* ── Form ── */
    function openForm(id){
      editId=id||null;
      const shell=document.getElementById('form-shell');
      if(id){
        const t=tasks.find(x=>x.i===id);
        if(!t)return;
        document.getElementById('f-text').value=t.t;
        document.getElementById('f-pri').value=t.p||'';
        document.getElementById('f-cat').value=t.c||'';
        document.getElementById('f-due').value=t.u||'';
      } else {
        document.getElementById('f-text').value='';
        document.getElementById('f-pri').value='';
        document.getElementById('f-cat').value='';
        document.getElementById('f-due').value='';
      }
      formOpen=true;shell.classList.add('open');
      setTimeout(()=>document.getElementById('f-text').focus(),60);
    }
    function closeForm(){
      formOpen=false;editId=null;
      document.getElementById('form-shell').classList.remove('open');
    }
    function fKey(e){if(e.key==='Enter')saveTask();if(e.key==='Escape')closeForm();}

    function saveTask(){
      const txt=document.getElementById('f-text').value.trim();
      if(!txt)return document.getElementById('f-text').focus();
      const p=document.getElementById('f-pri').value;
      const c=document.getElementById('f-cat').value;
      const u=document.getElementById('f-due').value;
      if(editId){
        const k=tasks.find(x=>x.i===editId);
        if(k){k.t=txt;k.p=p;k.c=c;k.u=u;}
      } else {
        tasks.unshift({i:uid(),t:txt,p,c,u,dn:false,cr:Date.now()});
      }
      save();closeForm();render();
    }

    /* ── CRUD ── */
    const toggle=id=>{const k=tasks.find(x=>x.i===id);if(k){k.dn=!k.dn;save();render();}};
    const del=id=>{tasks=tasks.filter(x=>x.i!==id);save();render();};
    const clearDone=()=>{tasks=tasks.filter(x=>!x.dn);save();render();};

    /* ── Data ── */
    function getVisible(){
      const q=document.getElementById('search').value.trim().toLowerCase();
      const now=td();
      let r=tasks.filter(x=>{
        if(view==='today')    return x.u===now;
        if(view==='upcoming') return x.u&&x.u>now&&!x.dn;
        if(view==='high')     return x.p==='high'&&!x.dn;
        if(view==='done')     return x.dn;
        return true;
      });
      if(pri)r=r.filter(x=>x.p===pri);
      if(q)r=r.filter(x=>x.t.toLowerCase().includes(q)||(x.c||'').toLowerCase().includes(q));
      r.sort((a,b)=>{
        if(sort==='priority')return(PORD[a.p]??3)-(PORD[b.p]??3);
        if(sort==='due')return(a.u||'z')>(b.u||'z')?1:-1;
        if(sort==='alpha')return a.t.localeCompare(b.t);
        return b.cr-a.cr;
      });
      return r;
    }

    /* ── Task HTML ── */
    function tkHTML(x){
      const now=td();
      let dl='',dc='dt';
      if(x.u){
        if(x.u===now){dl='Today';dc='dt tod';}
        else if(x.u<now&&!x.dn){dl='Overdue';dc='dt ov';}
        else dl=x.u;
      }
      const pri=x.p?`<span class="pl ${x.p}">${x.p}</span>`:'';
      const cat=x.c?`<span class="pl cat">${x.c}</span>`:'';
      const due=dl?`<span class="${dc}">${dl}</span>`:'';
      return`<div class="tk${x.dn?' dn':''}">
      <button class="ck" onclick="toggle('${x.i}')"><svg viewBox="0 0 10 8"><polyline points="1,4 4,7 9,1"/></svg></button>
      <div class="tb">
        <div class="tt">${esc(x.t)}</div>
        ${pri||cat||due?`<div class="tm">${pri}${cat}${due}</div>`:''}
      </div>
      <div class="ta">
        <button class="ib" onclick="openForm('${x.i}')" title="Edit">
          <svg viewBox="0 0 14 14"><path d="M1 13l2-.5 8-8-1.5-1.5-8 8z"/><path d="M10 2.5l1.5 1.5"/></svg>
        </button>
        <button class="ib del" onclick="del('${x.i}')" title="Delete">
          <svg viewBox="0 0 14 14"><polyline points="2,4 12,4"/><path d="M5,4V2h4v2"/><path d="M3,4l.8,8h6.4l.8-8"/></svg>
        </button>
      </div>
    </div>`;
    }

    /* ── Render ── */
    function render(){
      const now=td();
      const all=tasks,done=all.filter(x=>x.dn),active=all.filter(x=>!x.dn);
      const pct=all.length?Math.round(done.length/all.length*100):0;

      document.getElementById('prog-fill').style.width=pct+'%';
      document.getElementById('pct-b').textContent=pct+'%';
      document.getElementById('st-total').textContent=all.length;
      document.getElementById('st-active').textContent=active.length;
      document.getElementById('st-done').textContent=done.length;
      document.getElementById('nb-all').textContent=active.length||'—';
      document.getElementById('nb-today').textContent=active.filter(x=>x.u===now).length||'—';
      document.getElementById('nb-up').textContent=active.filter(x=>x.u&&x.u>now).length||'—';
      document.getElementById('nb-high').textContent=active.filter(x=>x.p==='high').length||'—';
      document.getElementById('nb-done').textContent=done.length||'—';

      const vis=getVisible();
      const list=document.getElementById('list');

      if(!vis.length){
        list.innerHTML=`<div class="emp">
          <svg viewBox="0 0 48 48"><rect x="8" y="6" width="32" height="36" rx="4"/><line x1="15" y1="16" x2="33" y2="16"/><line x1="15" y1="24" x2="33" y2="24"/><line x1="15" y1="32" x2="24" y2="32"/></svg>
          <div class="emp-t">${tasks.length?'No tasks match':'No tasks yet'}</div>
          <div class="emp-s">${tasks.length?'Try a different filter':'Click "New task" to get started'}</div>
        </div>`;
        return;
      }

      const act=vis.filter(x=>!x.dn),dn=vis.filter(x=>x.dn);
      let h='';
      if(act.length)h+=`<div class="grp-hd">Active <span class="grp-line"></span><span>${act.length}</span></div>`+act.map(tkHTML).join('');
      if(dn.length){
        h+=`<div class="grp-hd">Completed <span class="grp-line"></span><span>${dn.length}</span></div>`+dn.map(tkHTML).join('');
        h+=`<div style="margin-top:12px;text-align:right"><button onclick="clearDone()" style="font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 2px;transition:color .12s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">Clear completed</button></div>`;
      }
      list.innerHTML=h;
    }

    render();
</script>
</body>
</html>
