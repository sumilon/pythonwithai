<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
    <meta name="description" content="2048 — slide tiles, merge numbers, reach 2048."/>
    <meta name="theme-color" content="#0f1117"/>
    <title>2048</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet"/>
    <style>
        /* ── RESET ── */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{height:100%;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

        /* ── BASE ── */
        body{
          background:#0f1117;
          color:#e8eaf2;
          font-family:'Space Grotesk',system-ui,sans-serif;
          min-height:100%;
          display:flex;
          flex-direction:column;
          align-items:center;
          overflow-x:hidden;
          padding:0 0 2rem;
          user-select:none;
          -webkit-user-select:none;
        }

        /* ── HEADER ── */
        .hdr{
          width:100%;
          display:flex;
          align-items:center;
          justify-content:space-between;
          gap:8px;
          padding:clamp(10px,2.5vw,18px) clamp(12px,4vw,24px) 0;
          /* width is constrained by JS to match board */
        }
        .logo{
          font-size:clamp(1.8rem,9vw,3rem);
          font-weight:800;
          color:#f5a623;
          line-height:1;
          letter-spacing:-0.04em;
          flex-shrink:0;
        }
        .score-box{
          background:#1a1d27;
          border:1px solid #252a3d;
          border-radius:9px;
          padding:5px 12px;
          text-align:center;
          flex-shrink:0;
        }
        .score-lbl{
          font-size:9px;
          font-weight:700;
          letter-spacing:.1em;
          text-transform:uppercase;
          color:#3d445e;
          display:block;
          margin-bottom:1px;
        }
        .score-num{
          font-size:clamp(.95rem,4vw,1.35rem);
          font-weight:800;
          color:#fff;
          line-height:1;
          display:block;
        }
        .score-num.pop{animation:pop .3s ease}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3);color:#f5a623}100%{transform:scale(1)}}

        /* ── CONTROLS ── */
        .ctrl{
          width:100%;
          display:flex;
          gap:6px;
          padding:8px clamp(12px,4vw,24px) 0;
        }
        .btn{
          flex:1;
          padding:8px 4px;
          border-radius:8px;
          border:1px solid #252a3d;
          background:#1a1d27;
          color:#6b7299;
          font-family:'Space Grotesk',sans-serif;
          font-size:clamp(11px,3vw,13px);
          font-weight:700;
          cursor:pointer;
          display:flex;
          align-items:center;
          justify-content:center;
          gap:4px;
          transition:background .12s,color .12s;
          min-height:38px;
          overflow:hidden;
          white-space:nowrap;
        }
        .btn:hover{background:#1f2538;color:#a0a8cc}
        .btn:active{transform:scale(.97)}
        .btn-new{color:#f5a623;border-color:#332612}
        .btn-new:hover{background:#1e1508;color:#f5a623}
        .btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
        #btn-undo:disabled{opacity:.3;pointer-events:none}

        /* ── BOARD SHELL ── */
        /* board-wrap dimensions are set entirely in JS */
        .board-wrap{
          position:relative;
          margin:clamp(8px,2.5vw,14px) auto 0;
          flex-shrink:0;
        }
        .board-bg{
          position:absolute;
          inset:0;
          background:#1a1d27;
          border-radius:10px;
        }
        /* Cell placeholders — injected by JS */
        .bg-cell{
          position:absolute;
          background:#252836;
          border-radius:6px;
        }
        /* Tile layer */
        .tile-layer{position:absolute;inset:0}

        /* ── TILES — color + font only, position/size set in JS ── */
        .tile{
          position:absolute;
          display:flex;
          align-items:center;
          justify-content:center;
          font-weight:800;
          border-radius:6px;
          will-change:left,top;
          transition:left .12s cubic-bezier(.25,.46,.45,.94),
                     top  .12s cubic-bezier(.25,.46,.45,.94);
          line-height:1;
        }
        .tile.new{animation:tNew .18s ease backwards}
        .tile.merge{animation:tMerge .22s ease}
        @keyframes tNew{0%{transform:scale(0);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
        @keyframes tMerge{0%,100%{transform:scale(1)}45%{transform:scale(1.2)}}

        /* Tile colours */
        .t2   {background:#2d3248;color:#c8d0f0}
        .t4   {background:#363c58;color:#c8d0f0}
        .t8   {background:#b85c2c;color:#fff}
        .t16  {background:#d0561e;color:#fff}
        .t32  {background:#e04810;color:#fff}
        .t64  {background:#f03408;color:#fff}
        .t128 {background:#daa018;color:#fff}
        .t256 {background:#e8b010;color:#fff}
        .t512 {background:#f0c010;color:#fff}
        .t1024{background:#f5a623;color:#fff}
        .t2048{background:#ff9400;color:#fff;box-shadow:0 0 18px rgba(255,148,0,.4)}
        .t4096{background:#a855f7;color:#fff;box-shadow:0 0 18px rgba(168,85,247,.35)}
        .t8192{background:#ec4899;color:#fff;box-shadow:0 0 18px rgba(236,72,153,.35)}
        .tbig {background:#f0f;color:#fff}

        /* ── OVERLAYS ── */
        .overlay{
          position:absolute;
          inset:0;
          border-radius:10px;
          background:rgba(15,17,23,.87);
          display:none;
          flex-direction:column;
          align-items:center;
          justify-content:center;
          gap:12px;
          z-index:40;
          backdrop-filter:blur(4px);
          -webkit-backdrop-filter:blur(4px);
          animation:fadeIn .25s ease;
          padding:1rem;
          text-align:center;
        }
        .overlay.show{display:flex}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .ov-title{
          font-size:clamp(1.3rem,6vw,2rem);
          font-weight:800;
          color:#fff;
        }
        .ov-title.win{color:#f5a623}
        .ov-score{font-size:clamp(.8rem,3vw,1rem);color:#6b7299;margin-top:-4px}
        .ov-btn{
          padding:10px clamp(14px,4vw,24px);
          border-radius:9px;
          border:none;
          background:#f5a623;
          color:#0f1117;
          font-family:'Space Grotesk',sans-serif;
          font-size:clamp(12px,3.5vw,14px);
          font-weight:700;
          cursor:pointer;
          transition:background .12s,transform .1s;
        }
        .ov-btn:hover{background:#e89518}
        .ov-btn:active{transform:scale(.97)}
        .ov-btn-ghost{
          padding:10px clamp(14px,4vw,24px);
          border-radius:9px;
          border:1px solid #252a3d;
          background:transparent;
          color:#6b7299;
          font-family:'Space Grotesk',sans-serif;
          font-size:clamp(12px,3.5vw,14px);
          font-weight:600;
          cursor:pointer;
          transition:all .12s;
        }
        .ov-btn-ghost:hover{background:#1a1d27;color:#a0a8cc}

        /* ── HOW TO PLAY ── */
        .howto{
          width:100%;
          max-width:100%;
          padding:10px clamp(12px,4vw,24px) 0;
          /* width constrained to board in JS */
        }
        .howto-inner{
          background:#1a1d27;
          border:1px solid #252a3d;
          border-radius:10px;
          padding:10px 14px;
        }
        .howto-title{
          font-size:10px;
          font-weight:700;
          letter-spacing:.09em;
          text-transform:uppercase;
          color:#3d445e;
          margin-bottom:6px;
        }
        .howto-items{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:3px 12px;
        }
        .howto-item{
          font-size:clamp(10px,2.5vw,11px);
          color:#4a5270;
          line-height:1.5;
          display:flex;
          align-items:baseline;
          gap:4px;
          overflow:hidden;
        }
        .howto-key{
          font-weight:700;
          color:#5a6290;
          flex-shrink:0;
          font-size:clamp(10px,2.5vw,11px);
        }

        /* ── FLOATING SCORE LABEL ── */
        .float-score{
          position:fixed;
          font-size:1rem;
          font-weight:700;
          color:#f5a623;
          pointer-events:none;
          z-index:9999;
          animation:floatUp .65s ease forwards;
        }
        @keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-36px)}}
    </style>
</head>
<body>

<!-- HEADER -->
<header class="hdr" id="hdr">
    <div class="logo">2048</div>
    <div class="score-box">
        <span class="score-lbl">Score</span>
        <span class="score-num" id="score">0</span>
    </div>
</header>

<!-- CONTROLS -->
<div class="ctrl" id="ctrl">
    <button class="btn btn-new" id="btn-new" type="button">
        <svg viewBox="0 0 16 16"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5"/><polyline points="10,1 13.5,2.5 12,6"/></svg>
        New Game
    </button>
    <button class="btn" id="btn-undo" type="button" disabled>
        <svg viewBox="0 0 16 16"><path d="M2.5 8A5.5 5.5 0 1 0 8 2.5"/><polyline points="6,1 2.5,2.5 4,6"/></svg>
        Undo
    </button>
</div>

<!-- BOARD -->
<main class="board-wrap" id="board-wrap" role="main" aria-label="2048 game board">
    <div class="board-bg" id="board-bg"></div>
    <div class="tile-layer" id="tile-layer"></div>

    <!-- Game Over overlay -->
    <div class="overlay" id="ov-over" role="dialog" aria-label="Game over">
        <div class="ov-title">Game Over</div>
        <div class="ov-score" id="ov-score-txt"></div>
        <button class="ov-btn" id="btn-retry" type="button">Try Again</button>
    </div>

    <!-- Win overlay -->
    <div class="overlay" id="ov-win" role="dialog" aria-label="You win">
        <div class="ov-title win">You Win!</div>
        <div class="ov-score">Reached 2048!</div>
        <button class="ov-btn" id="btn-keep" type="button">Keep Going</button>
        <button class="ov-btn-ghost" id="btn-new-win" type="button">New Game</button>
    </div>
</main>

<!-- HOW TO PLAY -->
<div class="howto" id="howto">
    <div class="howto-inner">
        <div class="howto-title">How to play</div>
        <div class="howto-items">
            <div class="howto-item"><span class="howto-key">Arrows</span> move tiles</div>
            <div class="howto-item"><span class="howto-key">WASD</span> also works</div>
            <div class="howto-item"><span class="howto-key">Swipe</span> on mobile</div>
            <div class="howto-item"><span class="howto-key">Z</span> to undo move</div>
        </div>
    </div>
</div>

<script>
    (function(){
    'use strict';

    /* ══════════════════════════════
       CONSTANTS
    ══════════════════════════════ */
    const N    = 4;          // grid size
    const WIN  = 2048;
    const ANIM = 120;        // slide ms — matches CSS transition
    const MERGE_ANIM = 220;  // merge animation ms

    /* ══════════════════════════════
       LAYOUT — computed entirely in JS
       No CSS vars used for sizing.
    ══════════════════════════════ */
    let L = { cell: 96, gap: 10, board: 0 }; // updated by computeLayout()

    function computeLayout() {
      const sidePad = Math.min(Math.max(window.innerWidth * 0.04, 12), 24);
      const avail   = Math.floor(window.innerWidth - sidePad * 2);
      // Use Math.floor throughout to guarantee board <= avail
      const gap  = Math.floor(Math.min(Math.max(avail * 0.014, 5), 12));
      const cell = Math.floor(Math.min(Math.max((avail - 5 * gap) / 4, 58), 108));
      const board = 4 * cell + 5 * gap;
      L = { cell, gap, board };
    }

    function applyBoardSize() {
      const wrap = document.getElementById('board-wrap');
      const bg   = document.getElementById('board-bg');
      wrap.style.width  = L.board + 'px';
      wrap.style.height = L.board + 'px';
      bg.style.width    = L.board + 'px';
      bg.style.height   = L.board + 'px';

      // Constrain header, controls, howto to board width
      ['hdr','ctrl','howto'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.style.maxWidth = L.board + 'px'; el.style.width = '100%'; }
      });
    }

    function buildBgCells() {
      const bg = document.getElementById('board-bg');
      bg.innerHTML = '';
      for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
          const d = document.createElement('div');
          d.className = 'bg-cell';
          d.style.width  = L.cell + 'px';
          d.style.height = L.cell + 'px';
          d.style.left   = (L.gap + c * (L.cell + L.gap)) + 'px';
          d.style.top    = (L.gap + r * (L.cell + L.gap)) + 'px';
          bg.appendChild(d);
        }
      }
    }

    function tileLeft(c) { return L.gap + c * (L.cell + L.gap); }
    function tileTop(r)  { return L.gap + r * (L.cell + L.gap); }

    function tileFontSize(v) {
      const digits = String(v).length;
      if (digits <= 2) return Math.round(L.cell * 0.42) + 'px';
      if (digits === 3) return Math.round(L.cell * 0.36) + 'px';
      return Math.round(L.cell * 0.29) + 'px';
    }

    /* ══════════════════════════════
       GAME STATE — no localStorage
    ══════════════════════════════ */
    let G = {
      board:     [],       // 4×4 values
      score:     0,
      over:      false,
      won:       false,
      keepGoing: false,
      history:   [],       // undo stack [{board, score}]
      tileId:    0,
    };

    const TILES = new Map(); // id → {el, r, c, val}

    /* ══════════════════════════════
       HELPERS
    ══════════════════════════════ */
    const $     = id => document.getElementById(id);
    const empty = ()  => Array.from({ length: N }, () => Array(N).fill(0));
    const clone = b   => b.map(r => [...r]);

    function emptyCells(b) {
      const out = [];
      for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
          if (!b[r][c]) out.push({ r, c });
      return out;
    }

    function spawnRandom(b) {
      const cells = emptyCells(b);
      if (!cells.length) return null;
      const { r, c } = cells[Math.floor(Math.random() * cells.length)];
      b[r][c] = Math.random() < 0.9 ? 2 : 4;
      return { r, c, val: b[r][c] };
    }

    function hasMoves(b) {
      for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++) {
          if (!b[r][c]) return true;
          if (r < N - 1 && b[r][c] === b[r+1][c]) return true;
          if (c < N - 1 && b[r][c] === b[r][c+1]) return true;
        }
      return false;
    }

    function hasVal(b, v) {
      for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
          if (b[r][c] === v) return true;
      return false;
    }

    /* ══════════════════════════════
       SLIDE A SINGLE ROW
       Returns { row, gained, mergedAt[] }
    ══════════════════════════════ */
    function slideRow(row) {
      let vals    = row.filter(v => v);
      let gained  = 0;
      let merged  = [];

      for (let i = 0; i < vals.length - 1; i++) {
        if (vals[i] === vals[i+1]) {
          vals[i] *= 2;
          gained  += vals[i];
          merged.push(i);
          vals.splice(i + 1, 1);
        }
      }
      while (vals.length < N) vals.push(0);
      return { row: vals, gained, merged };
    }

    /* ══════════════════════════════
       COMPUTE FULL BOARD MOVE
       Returns { newBoard, moved, gained, mergedCells }
    ══════════════════════════════ */
    function computeMove(dir) {
      const b     = clone(G.board);
      let moved   = false;
      let gained  = 0;
      const mergedCells = []; // {r,c} positions of merged result tiles

      const getRow = (b, i) => b[i].slice();
      const getCol = (b, i) => b.map(r => r[i]);
      const setRow = (b, i, v) => { b[i] = v.slice(); };
      const setCol = (b, i, v) => { v.forEach((val, r) => b[r][i] = val); };

      for (let i = 0; i < N; i++) {
        let line, rev = false;
        if (dir === 'l') line = getRow(b, i);
        if (dir === 'r') { line = getRow(b, i); rev = true; }
        if (dir === 'u') line = getCol(b, i);
        if (dir === 'd') { line = getCol(b, i); rev = true; }

        if (rev) line.reverse();
        const orig = [...line];
        const { row, gained: g, merged } = slideRow(line);
        gained += g;

        merged.forEach(idx => {
          const [r, c] = dir === 'l' ? [i, idx]
                       : dir === 'r' ? [i, N-1-idx]
                       : dir === 'u' ? [idx, i]
                       :               [N-1-idx, i];
          mergedCells.push({ r, c });
        });

        let result = [...row];
        if (rev) result.reverse();
        if (result.some((v, j) => v !== orig[j])) moved = true;

        if (dir === 'l' || dir === 'r') setRow(b, i, result);
        else setCol(b, i, result);
      }

      return { newBoard: b, moved, gained, mergedCells };
    }

    /* ══════════════════════════════
       DOM — TILE CREATION & MOVEMENT
    ══════════════════════════════ */
    function tileClass(v) {
      if (v >= 8192) return 'tbig';
      return 't' + v;
    }

    function createTile(id, val, r, c, isNew) {
      const el       = document.createElement('div');
      el.className   = 'tile ' + tileClass(val) + (isNew ? ' new' : '');
      el.textContent = val;
      el.style.width  = L.cell + 'px';
      el.style.height = L.cell + 'px';
      el.style.left   = tileLeft(c) + 'px';
      el.style.top    = tileTop(r)  + 'px';
      el.style.fontSize = tileFontSize(val);
      el.setAttribute('aria-label', val + ' at row ' + (r+1) + ' col ' + (c+1));
      $('tile-layer').appendChild(el);
      TILES.set(id, { el, r, c, val });
      return el;
    }

    function moveTile(id, r, c) {
      const t = TILES.get(id);
      if (!t) return;
      t.el.style.left = tileLeft(c) + 'px';
      t.el.style.top  = tileTop(r)  + 'px';
      t.r = r; t.c = c;
    }

    function removeTile(id) {
      const t = TILES.get(id);
      if (!t) return;
      t.el.remove();
      TILES.delete(id);
    }

    /* Rebuild all tiles from scratch (new game / undo) */
    function fullRender() {
      $('tile-layer').innerHTML = '';
      TILES.clear();
      G.tileId = 0;
      for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++) {
          const v = G.board[r][c];
          if (v) createTile(++G.tileId, v, r, c, false);
        }
    }

    /* Re-apply positions to all existing tiles (after layout resize) */
    function repositionTiles() {
      TILES.forEach(t => {
        t.el.style.width    = L.cell + 'px';
        t.el.style.height   = L.cell + 'px';
        t.el.style.left     = tileLeft(t.c) + 'px';
        t.el.style.top      = tileTop(t.r)  + 'px';
        t.el.style.fontSize = tileFontSize(t.val);
      });
      // Also resize bg-cells
      document.querySelectorAll('.bg-cell').forEach((el, i) => {
        const r = Math.floor(i / N), c = i % N;
        el.style.width  = L.cell + 'px';
        el.style.height = L.cell + 'px';
        el.style.left   = (L.gap + c * (L.cell + L.gap)) + 'px';
        el.style.top    = (L.gap + r * (L.cell + L.gap)) + 'px';
      });
    }

    /* ══════════════════════════════
       SCORE UI
    ══════════════════════════════ */
    function updateScore(gained, mergedEl) {
      const el = $('score');
      el.textContent = G.score.toLocaleString();
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');

      if (gained && mergedEl) {
        const rect = mergedEl.getBoundingClientRect();
        const lbl  = document.createElement('div');
        lbl.className = 'float-score';
        lbl.textContent = '+' + gained;
        lbl.style.left = rect.left + rect.width / 2 - 16 + 'px';
        lbl.style.top  = rect.top  + window.scrollY - 10 + 'px';
        document.body.appendChild(lbl);
        setTimeout(() => lbl.remove(), 700);
      }
    }

    /* ══════════════════════════════
       OVERLAYS
    ══════════════════════════════ */
    function hideOverlays() {
      $('ov-over').classList.remove('show');
      $('ov-win').classList.remove('show');
    }

    function showOver() {
      $('ov-score-txt').textContent = 'Score: ' + G.score.toLocaleString();
      $('ov-over').classList.add('show');
    }

    function showWin() {
      $('ov-win').classList.add('show');
    }

    /* ══════════════════════════════
       UNDO BUTTON
    ══════════════════════════════ */
    function syncUndo() {
      $('btn-undo').disabled = G.history.length === 0 || G.over;
    }

    /* ══════════════════════════════
       GAME INIT
    ══════════════════════════════ */
    function newGame() {
      G.board     = empty();
      G.score     = 0;
      G.over      = false;
      G.won       = false;
      G.keepGoing = false;
      G.history   = [];
      G.tileId    = 0;
      hideOverlays();
      spawnRandom(G.board);
      spawnRandom(G.board);
      fullRender();
      $('score').textContent = '0';
      syncUndo();
    }

    /* ══════════════════════════════
       UNDO
    ══════════════════════════════ */
    function undo() {
      if (!G.history.length || G.over) return;
      const prev  = G.history.pop();
      G.board     = prev.board;
      G.score     = prev.score;
      G.over      = false;
      hideOverlays();
      fullRender();
      $('score').textContent = G.score.toLocaleString();
      syncUndo();
    }

    /* ══════════════════════════════
       TILE MAPPING — trace old positions → new positions
       Matches each tile id to its destination after slide.
    ══════════════════════════════ */
    function buildMapping(oldBoard, newBoard, dir) {
      const posMap = new Map();
      TILES.forEach((t, id) => posMap.set(t.r + ',' + t.c, id));

      const result = []; // {id, toR, toC, eaten}

      function processLine(indices) {
        const src = indices
          .map(({r,c}) => ({ r, c, v: oldBoard[r][c], id: posMap.get(r+','+c) || null }))
          .filter(x => x.v);
        const dstIdx = indices.filter(({r,c}) => newBoard[r][c]);

        let si = 0, di = 0;
        while (si < src.length && di < dstIdx.length) {
          const s   = src[si];
          const dst = dstIdx[di];
          const dv  = newBoard[dst.r][dst.c];
          const taken = result.some(x => x.toR === dst.r && x.toC === dst.c && !x.eaten);

          if (!taken && si + 1 < src.length && src[si].v === src[si+1].v && src[si].v * 2 === dv) {
            // Merge: two tiles → one
            if (s.id)           result.push({ id: s.id,           toR: dst.r, toC: dst.c, eaten: false });
            if (src[si+1].id)   result.push({ id: src[si+1].id,   toR: dst.r, toC: dst.c, eaten: true  });
            si += 2; di++;
          } else {
            if (s.id)           result.push({ id: s.id,           toR: dst.r, toC: dst.c, eaten: false });
            si++; di++;
          }
        }
        // Unmapped leftovers (shouldn't happen, safety net)
        while (si < src.length) {
          if (src[si].id) result.push({ id: src[si].id, toR: src[si].r, toC: src[si].c, eaten: false });
          si++;
        }
      }

      if (dir === 'l') for (let r=0;r<N;r++) processLine(Array.from({length:N},(_,c)=>({r,c})));
      if (dir === 'r') for (let r=0;r<N;r++) processLine(Array.from({length:N},(_,c)=>({r,c:N-1-c})));
      if (dir === 'u') for (let c=0;c<N;c++) processLine(Array.from({length:N},(_,r)=>({r,c})));
      if (dir === 'd') for (let c=0;c<N;c++) processLine(Array.from({length:N},(_,r)=>({r:N-1-r,c})));

      return result;
    }

    /* ══════════════════════════════
       MAIN MOVE HANDLER
    ══════════════════════════════ */
    let busy = false;

    function doMove(dir) {
      if (busy || G.over) return;

      const { newBoard, moved, gained, mergedCells } = computeMove(dir);
      if (!moved) return;

      busy = true;

      // Save undo snapshot (cap at 8 for memory)
      G.history.push({ board: clone(G.board), score: G.score });
      if (G.history.length > 8) G.history.shift();
      syncUndo();

      const mapping = buildMapping(G.board, newBoard, dir);

      // 1. Slide tiles to new positions
      mapping.forEach(({ id, toR, toC }) => moveTile(id, toR, toC));

      // 2. After slide: remove eaten tiles, update values, trigger merge anim
      setTimeout(() => {
        mapping.forEach(({ id, eaten }) => { if (eaten) removeTile(id); });

        const mergedSet = new Set(mergedCells.map(({r,c}) => r+','+c));
        let floatEl = null;

        TILES.forEach((t, id) => {
          const nv = newBoard[t.r][t.c];
          if (nv !== t.val) {
            t.val           = nv;
            t.el.className  = 'tile ' + tileClass(nv) + ' merge';
            t.el.textContent = nv;
            t.el.style.fontSize = tileFontSize(nv);
            t.el.setAttribute('aria-label', nv + ' at row ' + (t.r+1) + ' col ' + (t.c+1));
            if (mergedSet.has(t.r+','+t.c)) floatEl = t.el;
          }
        });

        G.board  = newBoard;
        G.score += gained;
        updateScore(gained, floatEl);

        // 3. After merge animation: spawn new tile + check state
        setTimeout(() => {
          const spawned = spawnRandom(G.board);
          if (spawned) createTile(++G.tileId, spawned.val, spawned.r, spawned.c, true);

          if (!G.keepGoing && !G.won && hasVal(G.board, WIN)) {
            G.won = true;
            showWin();
            busy = false;
            return;
          }

          if (!hasMoves(G.board)) {
            G.over = true;
            syncUndo();
            showOver();
            busy = false;
            return;
          }

          busy = false;
        }, MERGE_ANIM);

      }, ANIM);
    }

    /* ══════════════════════════════
       INPUT
    ══════════════════════════════ */
    document.addEventListener('keydown', e => {
      const map = {
        ArrowLeft:'l', ArrowRight:'r', ArrowUp:'u', ArrowDown:'d',
        a:'l', d:'r', w:'u', s:'d',
        A:'l', D:'r', W:'u', S:'d'
      };
      if (map[e.key]) { e.preventDefault(); doMove(map[e.key]); return; }
      if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); undo(); }
    });

    /* Touch / swipe */
    let tx = 0, ty = 0, swiping = false;
    const bw = $('board-wrap');

    bw.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      tx = e.touches[0].clientX;
      ty = e.touches[0].clientY;
      swiping = true;
    }, { passive: true });

    bw.addEventListener('touchmove', e => {
      if (swiping) e.preventDefault();
    }, { passive: false });

    bw.addEventListener('touchend', e => {
      if (!swiping) return;
      swiping = false;
      const dx = e.changedTouches[0].clientX - tx;
      const dy = e.changedTouches[0].clientY - ty;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
      doMove(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'r' : 'l') : (dy > 0 ? 'd' : 'u'));
    }, { passive: true });

    /* Buttons */
    $('btn-new').addEventListener('click',     newGame);
    $('btn-undo').addEventListener('click',    undo);
    $('btn-retry').addEventListener('click',   newGame);
    $('btn-keep').addEventListener('click',    () => { G.keepGoing = true; hideOverlays(); });
    $('btn-new-win').addEventListener('click', newGame);

    /* ══════════════════════════════
       LAYOUT INIT + RESIZE
    ══════════════════════════════ */
    function layout() {
      computeLayout();
      applyBoardSize();
    }

    function fullLayout() {
      computeLayout();
      applyBoardSize();
      buildBgCells();
      repositionTiles();
    }

    /* Debounced resize */
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(fullLayout, 150);
    });

    /* ══════════════════════════════
       BOOT
    ══════════════════════════════ */
    layout();        // size board before building cells
    buildBgCells();  // draw background grid
    newGame();       // start fresh (no localStorage)

    })();
</script>
</body>
</html>
