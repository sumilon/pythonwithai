<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Financial calculators — EMI, SIP, Lumpsum, FD, RD, SWP and weight price.">
    <title>Financial Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #f4f6fb;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        .container-box {
            max-width: 950px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }
        .calc-fields { display: none; }
        .btn-calc {
            width: 100%;
            background: #00b386;
            border: none;
            padding: 10px;
            color: white;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-calc:hover { background: #009973; }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }
        .result-row:last-child { border-bottom: none; }
        .result-row span:last-child { font-weight: 600; }
        canvas { max-height: 220px; }
        .error-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            color: #856404;
            margin-top: 12px;
        }
        .result-title {
            font-size: 13px;
            font-weight: 600;
            color: #00b386;
            margin-bottom: 6px;
        }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>

<div class="container-box">
    <h4 class="mb-3">Financial Calculator</h4>

    <div class="row">
        <div class="col-md-6">
            <form id="calcForm" novalidate>

                <select name="type" id="calcSelect" class="form-select mb-3">
                    <option value="">Select Calculator</option>
                    <option value="emi">EMI</option>
                    <option value="sip">SIP</option>
                    <option value="lumpsum">Lumpsum</option>
                    <option value="fd">FD (Fixed Deposit)</option>
                    <option value="rd">RD (Recurring Deposit)</option>
                    <option value="swp">SWP</option>
                    <option value="weight">Weight Price</option>
                </select>

                <!-- EMI -->
                <div id="emi" class="calc-fields">
                    <input class="form-control mb-2" type="number" name="emi_loan"  placeholder="Loan Amount (₹)" min="1">
                    <input class="form-control mb-2" type="number" name="emi_rate"  placeholder="Annual Interest Rate (%)" min="0.01" step="0.01">
                    <input class="form-control mb-2" type="number" name="emi_years" placeholder="Loan Tenure (Years)" min="1" step="1">
                </div>

                <!-- SIP -->
                <div id="sip" class="calc-fields">
                    <input class="form-control mb-2" type="number" name="sip_amount" placeholder="Monthly Investment (₹)" min="1">
                    <input class="form-control mb-2" type="number" name="sip_rate"   placeholder="Expected Return Rate (% p.a.)" min="0.01" step="0.01">
                    <input class="form-control mb-2" type="number" name="sip_years"  placeholder="Investment Duration (Years)" min="1" step="1">
                </div>

                <!-- Lumpsum -->
                <div id="lumpsum" class="calc-fields">
                    <input class="form-control mb-2" type="number" name="lumpsum_amount" placeholder="Investment Amount (₹)" min="1">
                    <input class="form-control mb-2" type="number" name="lumpsum_rate"   placeholder="Expected Return Rate (% p.a.)" min="0.01" step="0.01">
                    <input class="form-control mb-2" type="number" name="lumpsum_years"  placeholder="Investment Duration (Years)" min="1" step="1">
                </div>

                <!-- FD -->
                <div id="fd" class="calc-fields">
                    <input class="form-control mb-2" type="number" name="fd_principal" placeholder="Principal Amount (₹)" min="1">
                    <input class="form-control mb-2" type="number" name="fd_rate"      placeholder="Annual Interest Rate (%)" min="0.01" step="0.01">
                    <input class="form-control mb-2" type="number" name="fd_years"     placeholder="Tenure (Years)" min="1" step="1">
                    <small class="text-muted">Compounded quarterly</small>
                </div>

                <!-- RD -->
                <div id="rd" class="calc-fields">
                    <input class="form-control mb-2" type="number" name="rd_deposit" placeholder="Monthly Deposit (₹)" min="1">
                    <input class="form-control mb-2" type="number" name="rd_rate"    placeholder="Annual Interest Rate (%)" min="0.01" step="0.01">
                    <input class="form-control mb-2" type="number" name="rd_years"   placeholder="Tenure (Years)" min="1" step="1">
                    <small class="text-muted">Compounded quarterly</small>
                </div>

                <!-- SWP -->
                <div id="swp" class="calc-fields">
                    <input class="form-control mb-2" type="number" name="swp_principal" placeholder="Initial Investment (₹)" min="1">
                    <input class="form-control mb-2" type="number" name="swp_withdraw"  placeholder="Monthly Withdrawal (₹)" min="1">
                    <input class="form-control mb-2" type="number" name="swp_rate"      placeholder="Expected Return Rate (% p.a.)" min="0.01" step="0.01">
                    <input class="form-control mb-2" type="number" name="swp_inflation" placeholder="Inflation Rate (% p.a.)" min="0" step="0.01" value="0">
                    <input class="form-control mb-2" type="number" name="swp_years"     placeholder="Withdrawal Period (Years)" min="1" step="1">
                </div>

                <!-- Weight -->
                <div id="weight" class="calc-fields">
                    <input class="form-control mb-2" type="number" name="price_per_kg"  placeholder="Price per KG (₹)" min="0.01" step="0.01">
                    <input class="form-control mb-2" type="number" name="weight_grams"  placeholder="Weight (grams)" min="0.01" step="0.01">
                </div>

                <button type="submit" class="btn-calc mt-1">Calculate</button>
            </form>

            <div id="errorBox" class="error-box" style="display:none;"></div>
            <div id="results" class="mt-3"></div>
        </div>

        <div class="col-md-6 d-flex align-items-center justify-content-center">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
    // ---------------------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------------------
    function indianFormat(num) {
        if (num === null || num === undefined || isNaN(num)) return "0.00";
        const negative = num < 0;
        num = Math.abs(Math.round(num * 100) / 100);
        let [integer, decimal] = num.toFixed(2).split(".");
        if (integer.length > 3) {
            const last3 = integer.slice(-3);
            let rest = integer.slice(0, -3);
            const parts = [];
            while (rest.length > 2) {
                parts.unshift(rest.slice(-2));
                rest = rest.slice(0, -2);
            }
            if (rest) parts.unshift(rest);
            integer = parts.join(",") + "," + last3;
        }
        return (negative ? "-" : "") + integer + "." + decimal;
    }

    function row(label, value) {
        return `<div class="result-row"><span>${label}</span><span>₹${indianFormat(value)}</span></div>`;
    }

    function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent = msg;
        box.style.display = "block";
    }

    function clearError() {
        const box = document.getElementById("errorBox");
        box.textContent = "";
        box.style.display = "none";
    }

    function getVal(fd, name, required = true) {
        const v = parseFloat(fd.get(name));
        if (required && (isNaN(v) || v <= 0)) throw new Error(`"${name.replace(/_/g,' ')}" must be a positive number.`);
        return v;
    }

    // ---------------------------------------------------------------------------
    // Calculator logic (mirrors Python backend exactly)
    // ---------------------------------------------------------------------------
    function calcEMI(P, annualRate, years) {
        const r = annualRate / 100 / 12;
        const n = Math.round(years) * 12;
        const emi   = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
        const total = emi * n;
        return { emi, principal: P, interest: total - P, total };
    }

    function calcSIP(monthly, annualRate, years) {
        const r  = annualRate / 100 / 12;
        const n  = Math.round(years) * 12;
        const fv = monthly * ((Math.pow(1 + r, n) - 1) / r) * (1 + r);
        const invested = monthly * n;
        return { invested, returns: fv - invested, total: fv };
    }

    function calcLumpsum(amount, annualRate, years) {
        const total = amount * Math.pow(1 + annualRate / 100, Math.round(years));
        return { invested: amount, returns: total - amount, total };
    }

    function calcFD(principal, annualRate, years) {
        // Quarterly compounding — standard Indian bank FD
        const r     = annualRate / 100;
        const n     = Math.round(years);
        const total = principal * Math.pow(1 + r / 4, 4 * n);
        return { invested: principal, returns: total - principal, total };
    }

    function calcRD(deposit, annualRate, years) {
        // Quarterly compounding, installment-by-installment summation
        const quarterlyRate = (annualRate / 100) / 4;
        const totalMonths   = Math.round(years) * 12;
        let maturity = 0;
        for (let month = 1; month <= totalMonths; month++) {
            const quartersRemaining = (totalMonths - month + 1) / 3;
            maturity += deposit * Math.pow(1 + quarterlyRate, quartersRemaining);
        }
        const invested = deposit * totalMonths;
        return { invested, returns: maturity - invested, total: maturity };
    }

    function calcSWP(principal, monthlyWithdraw, annualRate, annualInflation, years) {
        const monthlyRate      = annualRate / 100 / 12;
        const monthlyInflation = annualInflation / 100 / 12;
        const totalMonths      = Math.round(years) * 12;
        let balance        = principal;
        let totalWithdrawn = 0;
        let curWithdraw    = monthlyWithdraw;

        for (let i = 0; i < totalMonths; i++) {
            balance += balance * monthlyRate;
            if (balance <= 0) break;
            if (balance <= curWithdraw) {
                totalWithdrawn += balance;
                balance = 0;
                break;
            }
            balance        -= curWithdraw;
            totalWithdrawn += curWithdraw;
            curWithdraw    *= (1 + monthlyInflation);
        }
        return { investment: principal, withdrawal: totalWithdrawn, final_value: balance };
    }

    function calcWeight(pricePerKg, grams) {
        return { price: (pricePerKg / 1000) * grams };
    }

    // ---------------------------------------------------------------------------
    // Chart
    // ---------------------------------------------------------------------------
    function drawChart(labels, data, colors) {
        if (window._chart) { window._chart.destroy(); window._chart = null; }
        // Only draw if all slices are positive
        if (!labels.length || data.some(d => d <= 0)) return;
        const ctx = document.getElementById("chart").getContext("2d");
        window._chart = new Chart(ctx, {
            type: "doughnut",
            data: {
                labels,
                datasets: [{ data, backgroundColor: colors }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: true },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                return " ₹" + indianFormat(ctx.parsed);
                            }
                        }
                    }
                }
            }
        });
    }

    // ---------------------------------------------------------------------------
    // Main
    // ---------------------------------------------------------------------------
    document.addEventListener("DOMContentLoaded", function () {
        const select     = document.getElementById("calcSelect");
        const sections   = ["emi","sip","lumpsum","fd","rd","swp","weight"];
        const form       = document.getElementById("calcForm");
        const resultsDiv = document.getElementById("results");
        window._chart    = null;

        function showSection(val) {
            sections.forEach(id => document.getElementById(id).style.display = "none");
            if (val) document.getElementById(val).style.display = "block";
            resultsDiv.innerHTML = "";
            clearError();
            if (window._chart) { window._chart.destroy(); window._chart = null; }
        }

        select.addEventListener("change", function () {
            form.querySelectorAll("input").forEach(i => { if (i.name !== "swp_inflation") i.value = ""; });
            showSection(this.value);
        });

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            clearError();
            resultsDiv.innerHTML = "";
            if (window._chart) { window._chart.destroy(); window._chart = null; }

            const fd   = new FormData(form);
            const type = fd.get("type");
            if (!type) { showError("Please select a calculator."); return; }

            let html   = "";
            let labels = [], data = [], colors = ["#00b386","#7C3AED","#f59e0b"];

            try {
                if (type === "emi") {
                    const P    = getVal(fd, "emi_loan");
                    const rate = getVal(fd, "emi_rate");
                    const yrs  = getVal(fd, "emi_years");
                    const r    = calcEMI(P, rate, yrs);
                    html += `<div class="result-title">EMI Breakdown</div>`;
                    html += row("Monthly EMI",   r.emi);
                    html += row("Principal",     r.principal);
                    html += row("Total Interest",r.interest);
                    html += row("Total Payment", r.total);
                    labels = ["Principal","Interest"];
                    data   = [r.principal, r.interest];
                }

                else if (type === "sip") {
                    const amt  = getVal(fd, "sip_amount");
                    const rate = getVal(fd, "sip_rate");
                    const yrs  = getVal(fd, "sip_years");
                    const r    = calcSIP(amt, rate, yrs);
                    html += `<div class="result-title">SIP Returns</div>`;
                    html += row("Amount Invested", r.invested);
                    html += row("Est. Returns",    r.returns);
                    html += row("Total Value",     r.total);
                    labels = ["Invested","Returns"];
                    data   = [r.invested, r.returns];
                }

                else if (type === "lumpsum") {
                    const amt  = getVal(fd, "lumpsum_amount");
                    const rate = getVal(fd, "lumpsum_rate");
                    const yrs  = getVal(fd, "lumpsum_years");
                    const r    = calcLumpsum(amt, rate, yrs);
                    html += `<div class="result-title">Lumpsum Returns</div>`;
                    html += row("Amount Invested", r.invested);
                    html += row("Est. Returns",    r.returns);
                    html += row("Total Value",     r.total);
                    labels = ["Invested","Returns"];
                    data   = [r.invested, r.returns];
                }

                else if (type === "fd") {
                    const p    = getVal(fd, "fd_principal");
                    const rate = getVal(fd, "fd_rate");
                    const yrs  = getVal(fd, "fd_years");
                    const r    = calcFD(p, rate, yrs);
                    html += `<div class="result-title">FD Maturity (Quarterly Compounding)</div>`;
                    html += row("Principal",      r.invested);
                    html += row("Interest Earned",r.returns);
                    html += row("Maturity Amount",r.total);
                    labels = ["Principal","Interest"];
                    data   = [r.invested, r.returns];
                }

                else if (type === "rd") {
                    const dep  = getVal(fd, "rd_deposit");
                    const rate = getVal(fd, "rd_rate");
                    const yrs  = getVal(fd, "rd_years");
                    const r    = calcRD(dep, rate, yrs);
                    html += `<div class="result-title">RD Maturity (Quarterly Compounding)</div>`;
                    html += row("Total Invested",  r.invested);
                    html += row("Interest Earned", r.returns);
                    html += row("Maturity Amount", r.total);
                    labels = ["Invested","Interest"];
                    data   = [r.invested, r.returns];
                }

                else if (type === "swp") {
                    const principal = getVal(fd, "swp_principal");
                    const withdraw  = getVal(fd, "swp_withdraw");
                    const rate      = getVal(fd, "swp_rate");
                    const inflation = parseFloat(fd.get("swp_inflation") || "0");
                    if (isNaN(inflation) || inflation < 0) throw new Error("Inflation must be 0 or positive.");
                    const yrs = getVal(fd, "swp_years");
                    const r   = calcSWP(principal, withdraw, rate, inflation, yrs);
                    html += `<div class="result-title">SWP Summary</div>`;
                    html += row("Initial Investment", r.investment);
                    html += row("Total Withdrawn",    r.withdrawal);
                    html += row("Remaining Balance",  r.final_value);
                    if (r.final_value > 0) {
                        labels = ["Withdrawn","Remaining"];
                        data   = [r.withdrawal, r.final_value];
                    } else {
                        labels = ["Withdrawn"];
                        data   = [r.withdrawal];
                        colors = ["#00b386"];
                    }
                }

                else if (type === "weight") {
                    const price = getVal(fd, "price_per_kg");
                    const grams = getVal(fd, "weight_grams");
                    const r     = calcWeight(price, grams);
                    html += `<div class="result-title">Price Calculation</div>`;
                    html += row("Total Price", r.price);
                    // No chart for weight
                }

            } catch (err) {
                showError(err.message || "Invalid input. Please check all fields.");
                return;
            }

            resultsDiv.innerHTML = html;
            drawChart(labels, data, colors);
        });
    });
</script>

</body>
</html>
